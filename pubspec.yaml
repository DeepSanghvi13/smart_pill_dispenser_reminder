publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  share_plus: ^10.0.2
  intl: ^0.18.1
