name: smart_pill_reminder
description: Smart Pill Reminder App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  share_plus: ^10.0.2
  intl: ^0.18.1
  url_launcher: ^6.2.2
  provider: ^6.0.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  flutter_tts: ^4.2.2
  mobile_scanner: ^5.2.3

  # ⭐ SQLite
  sqflite: ^2.3.0
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.3

  # ⭐ Web Database Support
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ⭐ HTTP Client for API
  http: ^1.1.0
  dio: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.1

flutter:
  uses-material-design: true
